<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prioritize Task Diary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-theme">
    <nav class="navbar">
        <div class="nav-brand" style="flex: 1;">TaskDiary</div>
        <div class="nav-links" style="flex: 1; display: flex; justify-content: center;">
            <button onclick="navigate('todo')" class="nav-btn active" id="nav-todo">ToDo</button>
            <button onclick="navigate('prioritize')" class="nav-btn" id="nav-prioritize">Prioritize</button>
            <button onclick="navigate('diary')" class="nav-btn" id="nav-diary">Diary</button>
        </div>
        <div class="nav-right" style="flex: 1; display: flex; justify-content: flex-end; align-items: center;">
            <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(event)">
            <button onclick="document.getElementById('import-file').click()" class="nav-btn" title="Import Data">📥 Import</button>
            <button onclick="exportData()" class="nav-btn" title="Export Data">📤 Export</button>
            <button onclick="openRecycleBin()" class="nav-btn" title="Recycle Bin">🗑️</button>
            <button id="theme-toggle" onclick="toggleTheme()" class="nav-btn">🌓 Theme</button>
        </div>
    </nav>
    
    <main>
        <!-- ToDo Page -->
        <section id="todo-page" class="page active">
            <h2>ToDo List</h2>
            <div class="controls space-between">
                <div class="input-group">
                    <input type="text" id="new-topic-input" placeholder="Enter new topic..." onkeypress="if(event.key === 'Enter') addTopic()">
                    <button onclick="addTopic()">Add Topic</button>
                </div>
                <select id="todo-sort" onchange="renderToDo()">
                    <option value="none">Sort by...</option>
                    <option value="name">Name (A-Z)</option>
                    <option value="date">Date</option>
                    <option value="priority">Priority (P1 - P5)</option>
                </select>
            </div>
            <div id="topics-container"></div>
        </section>

        <!-- Prioritize Page -->
        <section id="prioritize-page" class="page">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                <h2 style="margin: 0;">Prioritized Tasks</h2>
                <button onclick="document.getElementById('new-field-modal').showModal()">+ Add Field</button>
            </div>
            <div class="controls">
                <select id="prioritize-sort" onchange="renderPrioritize()">
                    <option value="priority">Sort by Priority (P1-P5)</option>
                    <option value="priorityNumber">Sort by Priority Number (1+)</option>
                    <option value="name">Sort by Name</option>
                </select>
            </div>
            <div id="prioritize-container"></div>
        </section>

        <!-- Diary Page -->
        <section id="diary-page" class="page">
            <h2>Diary</h2>
            <div class="diary-input">
                <input type="date" id="diary-date">
                <textarea id="diary-text" placeholder="Write your diary entry here..."></textarea>
                <button onclick="saveDiaryEntry()">Save Entry</button>
            </div>
            <div class="controls">
                <select id="diary-sort" onchange="renderDiary()">
                    <option value="newest">Sort: Newest First</option>
                    <option value="oldest">Sort: Oldest First</option>
                </select>
            </div>
            <div id="diary-entries-container"></div>
        </section>

        <!-- Modal for New Field -->
        <dialog id="new-field-modal">
            <h3>Add New Prioritize Field</h3>
            <input type="text" id="new-field-input" placeholder="e.g., Home, Work, Fitness" onkeypress="if(event.key === 'Enter') saveNewField()">
            <div class="modal-actions">
                <button onclick="saveNewField()">Save Field</button>
                <button onclick="closeFieldModal()" class="btn-cancel">Cancel</button>
            </div>
        </dialog>

        <!-- Modal for New Topic -->
        <dialog id="new-topic-modal">
            <h3>Add New Topic</h3>
            <input type="text" id="new-topic-modal-input" placeholder="e.g., New Project" onkeypress="if(event.key === 'Enter') saveNewTopicFromModal()">
            <div class="modal-actions">
                <button onclick="saveNewTopicFromModal()">Save Topic</button>
                <button onclick="closeTopicModal()" class="btn-cancel">Cancel</button>
            </div>
        </dialog>

    <!-- Modal for Recycle Bin -->
    <dialog id="recycle-bin-modal" style="width: 90%; max-width: 600px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3 style="margin: 0;">🗑️ Recycle Bin</h3>
            <button onclick="closeRecycleBin()" class="btn-cancel" style="padding: 0.2rem 0.5rem;">X</button>
        </div>
        <div id="recycle-bin-container" style="max-height: 60vh; overflow-y: auto; margin-bottom: 1rem;"></div>
        <div class="modal-actions" style="justify-content: flex-end;">
            <button onclick="emptyRecycleBin()" style="background-color: var(--danger-color);">Empty Bin</button>
        </div>
    </dialog>
    </main>
    <script src="app.js"></script>
</body>
</html>
